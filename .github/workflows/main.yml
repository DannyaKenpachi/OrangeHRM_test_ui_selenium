name: Automated Tests with Allure Report

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 1. Устанавливаем Allure ВРУЧНУЮ (без Docker)
      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.27.0/bin/allure /usr/bin/allure

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 2. Запускаем тесты
      - name: Run Test
        run: python -m pytest tests/ --headless --alluredir=allure-results
        continue-on-error: true

      # 3. Скачиваем историю (чтобы тренды рисовались)
      - name: Load test report history
        uses: actions/checkout@v3
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # 4. Генерируем отчет вручную командой
      - name: Generate Allure Report
        if: always()
        run: |
          # Копируем историю, если она есть
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history/
          fi
          
          # Генерируем отчет
          allure generate allure-results --clean -o allure-report

      # 5. Публикуем
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
